services:
  - type: web
    name: contact-phonebook
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: contact-phonebook-db
          property: connectionString

databases:
  - name: contact-phonebook-db
    plan: free
