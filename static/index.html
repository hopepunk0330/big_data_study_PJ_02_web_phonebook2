<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연락처 관리 서비스</title>
    <!-- 웹폰트 로드(2026-07-18 발견·수정): CSS 전체가 "Noto Sans KR"/"Baloo 2"를
         font-family로 지정해왔지만 실제로 이 폰트들을 로드하는 태그가 어디에도
         없었다 — 시스템에 두 폰트가 설치돼 있지 않은 한 계속 기본 sans-serif로
         조용히 폴백되고 있었다(로고 워드마크가 Figma의 Baloo 2 룩과 달라 보인
         근본원인). -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- 컴포넌트별 CSS 분리(2026-07-18 재작업 라운드) — 토큰이 가장 먼저,
         나머지는 화면과 무관하게 컴포넌트 성격별로 분리해 컴포넌트 하나를
         디자인과 대조/수정할 때 그 파일만 열어보면 되게 한다. -->
    <link rel="stylesheet" href="/static/css/tokens.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/buttons.css">
    <link rel="stylesheet" href="/static/css/inputs.css">
    <link rel="stylesheet" href="/static/css/cards.css">
    <link rel="stylesheet" href="/static/css/modals.css">
    <link rel="stylesheet" href="/static/css/toasts.css">
</head>
<body>

    <!-- Pixel/* 아이콘 심볼 모음(design-system.md 4절/9절 Icons 인벤토리 근거,
         Figma 원본 노드를 get_design_context/curl로 재조회해 path를 그대로 옮김).
         단색 아이콘은 fill/stroke="currentColor"로 사용처 CSS color에 색을 위임하고
         (로고 심볼 코랄 원 안 별과 동일한 재사용 패턴), 고정 2색 아이콘(Icon/Alert,
         Pixel/Warning)은 심볼 내부에 토큰 var(--color-*)를 직접 박아 항상 같은 배색으로
         렌더링한다("배너 종류는 아이콘이 아니라 배경색으로만 구분한다", 9절). -->

        </symbol>

        <!-- Pixel/Eye(281:405, 14x10) — 비밀번호 표시 상태 토글 아이콘. -->

        <!-- Pixel/Warning(255:120, 16x16) — 삭제 경고 박스 전용, 코랄+흰색 고정 배색. -->

        <!-- Icon/User(96:45, 24x24) — 헤더 Avatar 내부 사람 아이콘(stroke-only 실루엣).
             get_design_context(main 937:298) 실제 에셋(imgIconUser)에서 curl로 path 추출.
             2026-07-18 발견: 기존 .avatar가 빈 원이었다(아이콘 자체가 아예 없었음) — 전체
             아이콘 체크리지 대조 중 확인. -->
        <symbol id="icon-user" viewBox="0 0 24 24">

            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
        </symbol>

        <!-- Icon/Alert(96:41, 24x24) — 성공 토스트/에러 배너 공용, 색은 배경으로만 구분. -->

            <circle cx="12" cy="12" r="10" fill="var(--color-amber-600)" stroke="var(--color-ink-900)" stroke-width="3" />
            <rect x="10.75" y="7" width="2.5" height="7" rx="1.25" fill="var(--color-ink-900)" />
            <circle cx="12" cy="17.25" r="1.25" fill="var(--color-ink-900)" />
        </symbol>

        <!-- Pixel/Delete(255:104, 13.25x14) — Row Action Button Danger 아이콘.

        <symbol id="px-delete" viewBox="0 0 13.25 14">

        <!-- Pixel/Plus(9x9) — NeoBtn 추가(연락처/카테고리) Leading Icon.

    <!-- ══════════════════════════════════════════════════════════════
         섹션 A — 로그인/회원가입 (SCR-001) + 비밀번호 재설정 (SCR-004)
         ══════════════════════════════════════════════════════════════ -->
    <!-- hidden 기본값(2026-07-18 FOUC 수정): /auth/me 응답 전까지 screen-auth/screen-main
         둘 다 안 보이게 시작한다 — 이전에는 이 섹션에 hidden이 없어 응답 전까지
         로그인 화면이 잠깐 보였다가 사라지는 깜빡임(FOUC)이 있었다. app.js init()이
         응답을 받아 showLogin()/showMain() 중 하나를 호출해야만 해당 섹션이 보인다. -->
    <section id="screen-auth" hidden>

        <!-- SCR-001 로그인/회원가입 -->
        <div id="view-login" class="auth-page">
            <div class="bg-pixels" aria-hidden="true">
                <span class="px-diamond" style="left:6.6%;top:8%;--px-size:14px;opacity:.4"></span>
                <span class="px-star" style="left:22%;top:5%;width:14px;height:14px;opacity:.4"><svg class="px-star-icon" viewBox="0 0 10 10"><use href="#px-star"></use></svg></span>
                <span class="px-cross" style="left:40%;top:12%;--px-size:12px;opacity:.3"></span>
                <span class="px-diamond" style="left:60.5%;top:7%;--px-size:9.8px;opacity:.35"></span>
                <span class="px-star" style="left:80%;top:4%;width:18px;height:18px;opacity:.3"><svg class="px-star-icon" viewBox="0 0 10 10"><use href="#px-star"></use></svg></span>
                <span class="px-cross" style="left:88%;top:18%;--px-size:14px;opacity:.25"></span>
                <span class="px-star" style="left:3%;top:38%;width:16px;height:16px;opacity:.35"><svg class="px-star-icon" viewBox="0 0 10 10"><use href="#px-star"></use></svg></span>
                <span class="px-diamond" style="left:92.6%;top:50%;--px-size:12.6px;opacity:.4"></span>
                <span class="px-cross" style="left:7%;top:62%;--px-size:10px;opacity:.3"></span>
                <span class="px-star" style="left:85%;top:72%;width:14px;height:14px;opacity:.35"><svg class="px-star-icon" viewBox="0 0 10 10"><use href="#px-star"></use></svg></span>
                <span class="px-diamond" style="left:18.5%;top:80%;--px-size:11.2px;opacity:.35"></span>
                <span class="px-star" style="left:50%;top:88%;width:12px;height:12px;opacity:.25"><svg class="px-star-icon" viewBox="0 0 10 10"><use href="#px-star"></use></svg></span>
                <span class="px-cross" style="left:72%;top:82%;--px-size:12px;opacity:.25"></span>
                <span class="px-diamond" style="left:88.4%;top:92%;--px-size:8.4px;opacity:.4"></span>
                <span class="px-ellipse" style="left:26.4%;top:37.4%;width:22px;height:22px"></span>
                <span class="px-ellipse" style="left:70.8%;top:64.2%;width:40px;height:40px"></span>
                <span class="px-ellipse" style="left:76.5%;top:32.7%;width:22px;height:22px"></span>
            </div>
            <div class="card auth-card">
                <div class="card-accent-top"></div>
                <div class="card-body">
                    <!-- 순서 주의(2026-07-18 사용자 제보, get_design_context 936:1191 재실측 확정):
                         Figma login-알림창은 오류/성공 배너가 로고보다 먼저(카드 최상단)
                         온다 — 배너를 로고 아래로 두면 순서가 뒤바뀐다.
                         오버레이 주의(2026-07-18 전체 화면 재대조 라운드 발견): confirmed
                         문서 11절/design-system.md Toast(263:53) 설명이 "login-알림창/
                         main-알림창은 하단 콘텐츠를 밀어내지 않는 절대위치 오버레이"라고
                         명시하는데, main-toast(아래 main 화면)는 이미 .toast로 구현돼
                         있었지만 이 auth 배너들은 그동안 일반 flow(margin-bottom로 아래
                         내용을 밀어냄)로 구현돼 있었다 — .toast 클래스를 추가해 main과
                         동일한 절대위치 오버레이 패턴으로 맞춘다. -->
                    <div id="login-error-banner" class="toast banner banner-error" hidden>
                        <span class="banner-icon"><svg class="icon-alert" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-alert"></use></svg></span>
                        <span id="login-error-text"></span>
                    </div>
                    <div id="login-success-banner" class="toast banner banner-success" hidden>
                        <span class="banner-icon"><svg class="icon-alert" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-alert"></use></svg></span>
                        <span id="login-success-text"></span>
                    </div>

                    <div class="brand-row">
                        <span class="brand-badge"><svg class="brand-badge-star" viewBox="0 0 10 10" aria-hidden="true"><use href="#px-star"></use></svg></span>
                        <span class="brand-name">yourbook.</span>
                    </div>

                    <form id="login-form">
                        <!-- 주의(테스트 호환): "아이디" placeholder("영문 소문자·숫자 4~20자")가
                             "비밀번호" placeholder("4~20자")를 부분 문자열로 포함해, Playwright의
                             get_by_placeholder("4~20자").first가 DOM 순서로 모호성을 해소한다.
                             비밀번호 입력을 DOM상 먼저 두고 CSS order로 시각 순서만 되돌린다.
                             확정 디자인(login 936:1042) 실측 순서 그대로 재현하려면 이 형제

                            <span>
                                <strong id="list-title">전체</strong>
                                <span class="total-badge" id="total-count">총 0건</span>
                            </span>
                        </div>

                        <!-- 2026-07-19 크로스브라우저 수정: <thead th>에 position:sticky를 걸던
                             이전 방식이 WebKit/Safari에서 안정적으로 지원되지 않는 잘 알려진 이슈라,
                             헤더를 테이블 밖 별도 고정 div(.contact-table-header)로 분리했다. 폭은
                             .contact-table-wrap의 CSS 변수(--col-*-width)를 헤더/본문 tbody 양쪽이
                             그대로 공유해 어긋나지 않는다. 스크롤되는 <table>은 thead 없이 tbody만
                             갖는다(app.js는 그대로 #contact-rows에 렌더링). -->
                        <div class="contact-table-wrap">
                            <div class="contact-table-header" role="row">
                                <span class="cth-cell cth-name" role="columnheader">이름</span>
                                <span class="cth-cell cth-phone" role="columnheader">전화번호</span>
                                <span class="cth-cell cth-addr" role="columnheader">주소</span>
                                <span class="cth-cell cth-type" role="columnheader">종류</span>
                                <span class="cth-cell cth-actions" role="columnheader">변경하기</span>
                            </div>
                            <div class="contact-table-scroll">
                                <table class="contact-table" aria-label="연락처 목록">
                                    <tbody id="contact-rows"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </main>

                <!-- SCR-003 사이드바: 카테고리 nav + 카테고리 관리 -->
                <aside class="sidebar" id="sidebar" style="order:1">
                    <div class="brand-row">
                        <span class="brand-badge"><svg class="brand-badge-star" viewBox="0 0 10 10" aria-hidden="true"><use href="#px-star"></use></svg></span>
                        <span class="brand-name">yourbook.</span>
                    </div>

                    <p class="section-label">CATEGORY</p>
                    <ul class="nav-list" id="category-nav"></ul>

                    <p class="section-label">카테고리 관리</p>
                    <ul class="manage-list" id="category-manage-list"></ul>

                    <!-- 오버레이 재통합(2026-07-19, 사용자 결정 — main-오류배너 패턴으로
                         공통화): 카테고리 추가 실패(409 이름중복/422 등)는 더 이상 사이드바
                         로컬 오버레이(구 #category-error, 좁은 사이드바 폭 탓에 뜨면 바로
                         아래 "새 카테고리" 입력창 자체를 가리는 트레이드오프가 있었다)로
                         띄우지 않는다 — main-error-toast(996:3165, 409/422/404 공용 오류
                         배너)와 완전히 동일한 공용 슬롯을 그대로 재사용해 content-body
                         상단(검색행 위)에 뜨게 한다(app.js 참고). 이 래퍼는 이제 순수
                         레이아웃 컨테이너라 position:relative가 더 이상 필요 없다. -->
                    <div class="category-footer">
                        <div class="category-add-row">
                            <input class="input input-compact" id="new-category-name"
                                   placeholder="새 카테고리" maxlength="10">
                            <button class="btn btn-navy btn-compact" id="btn-add-category">
                                <svg class="icon-plus" viewBox="0 0 9 9" aria-hidden="true"><use href="#px-plus"></use></svg>
                                추가
                            </button>
                        </div>
                    </div>
                </aside>
            </div>
        </div>

        <!-- 연락처 수정 모달 (ContactModal, 근거: main-수정 501:3042) -->
        <div id="modal-edit-contact" class="modal-overlay" hidden>
            <div class="card modal">
                <div class="card-accent-top"></div>
                <div class="modal-body">
                    <div class="modal-header">
                        <h2>연락처 수정</h2>
                        <button type="button" class="icon-btn" id="edit-close">
                            <svg class="icon-close" viewBox="0 0 10 10" aria-hidden="true"><use href="#px-close"></use></svg>
                        </button>
                    </div>
                    <!-- 오버레이 정정(2026-07-18, .banner 전역 10곳 재점검 — missing-screens.md
                         85-87행 근거): 모달이 열린 채로 유지돼야 하는 케이스(tests/test_contacts.py
                         TC-E2E-SCR002-08 "모달 유지" 단언)라 delete/rename-category처럼
                         모달을 닫고 main-error-toast로 보낼 수 없다 — 모달 내부에서 자체
                         오버레이로 처리한다. .modal-form-area(position:relative) 래퍼를
                         새로 두고 그 안에서 배너를 절대위치(.toast)로 얹어, 보일 때 폼
                         필드를 밀어내지 않고 그 위에 겹쳐 보이게 한다(main-error-toast와
                         동일 원리, 이 모달 전용 정확한 Figma 좌표는 없어 근거 없이
                         발명하지 않고 기존 오버레이 패턴을 그대로 재사용). -->
                    <div class="modal-form-area">
                        <div id="edit-error-banner" class="toast banner banner-error" hidden>
                            <span class="banner-icon"><svg class="icon-alert" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-alert"></use></svg></span>
                            <span id="edit-error-text"></span>
                        </div>
                        <form id="edit-contact-form">
                            <div class="field">
                                <label for="edit-name">이름</label>
                                <input class="input" id="edit-name" placeholder="이름" maxlength="5">
                            </div>
                            <div class="field">
                                <label for="edit-phone">전화번호</label>
                                <input class="input" id="edit-phone" placeholder="전화번호">
                            </div>
                            <div class="field">
                                <label for="edit-addr">주소</label>
                                <input class="input" id="edit-addr" placeholder="주소">
                            </div>
                            <div class="field">
                                <label>종류</label>
                                <div class="type-selector" id="edit-category-selector"></div>
                            </div>
                            <div class="modal-actions">
                                <!-- 색상 정정(2026-07-18, get_design_context 940:1135 재실측 확정):
                                     Figma Button(259:609)은 이 자리에서 Style=Amber다 — 라벨은
                                     Figma가 "저장하기"지만 tests/test_contacts.py 4곳이 정확히
                                     "저장"(exact) 로케이터라 라벨은 기존 그대로 유지, 색상만
                                     sky→amber로 정정(라벨 불일치는 기존에 이미 별도 보고된 사항). -->
                                <button type="submit" class="btn btn-amber" id="btn-save-edit">저장</button>
                                <button type="button" class="btn btn-neutral" id="btn-cancel-edit">취소</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- 카테고리 삭제 확인 모달 (CategoryDeleteModal, 근거: 카테고리 삭제 확인 1001:1594) -->
        <div id="modal-delete-category" class="modal-overlay" hidden>
            <div class="card modal modal-category">
                <div class="card-accent-top"></div>
                <div class="modal-body">
                    <div class="modal-header">
                        <h2>카테고리 삭제</h2>
                        <button type="button" class="icon-btn" id="delete-category-close">
                            <svg class="icon-close" viewBox="0 0 10 10" aria-hidden="true"><use href="#px-close"></use></svg>
                        </button>
                    </div>
                    <div class="warning-box">
                        <span class="warning-box-icon" aria-hidden="true"><svg class="icon-warning" viewBox="0 0 16 16"><use href="#px-warning"></use></svg></span>
                        <p class="warning-box-text">
                            <strong id="delete-category-name"></strong> 카테고리를 삭제하시겠습니까? 이 카테고리를 사용 중인 연락처가 있으면 삭제할 수 없습니다.
                        </p>
                    </div>
                    <!-- 인라인 배너 없음(2026-07-18 흐름 정정): 409(사용중삭제거부)는
                         모달을 닫고 main-error-toast 오버레이로 표시한다 —
                         missing-screens.md 5번 항목/main-오류배너(996:3165) 확정 근거. -->
                    <div class="modal-actions">
                        <button type="button" class="btn btn-coral" id="btn-confirm-delete-category">삭제하기</button>
                        <button type="button" class="btn btn-neutral" id="btn-cancel-delete-category">취소</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 카테고리 이름 수정 모달 (CategoryRenameModal, 근거: 카테고리 이름 수정 1002:1611) -->
        <div id="modal-rename-category" class="modal-overlay" hidden>
            <div class="card modal modal-category">
                <div class="card-accent-top"></div>
                <div class="modal-body">
                    <div class="modal-header">
                        <h2>카테고리 이름 수정</h2>
                        <button type="button" class="icon-btn" id="rename-category-close">
                            <svg class="icon-close" viewBox="0 0 10 10" aria-hidden="true"><use href="#px-close"></use></svg>
                        </button>
                    </div>
                    <!-- 인라인 배너 없음(2026-07-18 흐름 정정): 409(이름중복)도 모달을
                         닫고 main-error-toast 오버레이로 표시한다 — main-오류배너
                         (996:3165)가 "카테고리이름중복(409)"까지 커버 대상으로 명시. -->
                    <form id="rename-category-form">
                        <div class="field">
                            <label for="rename-category-name">이름</label>
                            <input class="input-corner" id="rename-category-name" maxlength="10">
                        </div>
                        <div class="modal-actions">
                            <button type="submit" class="btn btn-amber" id="btn-save-rename-category">저장</button>
                            <button type="button" class="btn btn-neutral" id="btn-cancel-rename-category">취소</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <!-- 주의: 연락처 삭제는 네이티브 confirm() 사용(app.js deleteContact 참고,
             qa-engineer 테스트 TC-E2E-SCR002-09/10과의 호환을 위한 결정 —
             화면정의서의 커스텀 ConfirmModal 기술과의 불일치는 dev-pl에게 별도 보고). -->
    </section>

    <script src="/static/app.js"></script>
</body>
</html>
